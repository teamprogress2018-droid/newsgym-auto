name: Pobierz artykuly fitness codziennie

on:
  schedule:
    - cron: '0 7 * * *'  # Codziennie o 7:00 rano
  workflow_dispatch:      # Możliwość ręcznego uruchomienia

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Pobierz i wygeneruj 4 artykuly
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node fetch-articles.js

      - name: Commit nowe artykuly
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          git diff --quiet && git diff --staged --quiet || git commit -m "Dodaj artykuly fitness $(date +'%Y-%m-%d')"
          git push
