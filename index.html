<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0a0a">
<title>NEWS GYM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0a;--surface:#111;--surface2:#1a1a1a;--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);--text:#f0ece8;--muted:#777;--muted2:#555;--accent:#c8f135;--accent2:#a8d420;--red:#ff4444;--blue:#60a5fa;--orange:#f97316;--purple:#a78bfa;--pink:#f472b6;--teal:#2dd4bf;--radius:12px;--radius-sm:8px;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;overflow-x:hidden;}
input,button,textarea,select{font-family:'DM Sans',sans-serif;}
::-webkit-scrollbar{width:0;}
.app{display:flex;flex-direction:column;height:100dvh;max-width:520px;margin:0 auto;}
.hdr{padding:14px 18px 10px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;background:rgba(10,10,10,0.97);backdrop-filter:blur(12px);}
.hdr-logo{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:2px;color:var(--accent);text-shadow:0 0 30px rgba(200,241,53,0.3);line-height:1;}
.hdr-logo span{color:var(--text);}
.hdr-right{display:flex;gap:8px;align-items:center;}
.live-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(255,68,68,0.15);border:1px solid rgba(255,68,68,0.3);color:var(--red);font-size:9px;font-family:'DM Mono',monospace;font-weight:700;padding:2px 8px;border-radius:99px;letter-spacing:0.5px;}
.live-dot{width:5px;height:5px;border-radius:50%;background:var(--red);animation:pulse 1.5s ease infinite;}
.sync-btn{background:var(--surface2);border:1px solid var(--border2);color:var(--muted);border-radius:8px;padding:6px 10px;font-size:11px;cursor:pointer;font-family:'DM Mono',monospace;}
.fb-bar{display:flex;align-items:center;gap:6px;font-size:10px;font-family:'DM Mono',monospace;padding:5px 18px;background:rgba(200,241,53,0.04);border-bottom:1px solid var(--border);flex-shrink:0;}
.fb-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);flex-shrink:0;}
.fb-dot.loading{background:var(--orange);animation:pulse 1s ease infinite;}
.fb-dot.error{background:var(--red);}
.search-wrap{padding:10px 18px;flex-shrink:0;}
.search-box{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--border2);border-radius:10px;padding:10px 14px;transition:border-color 0.15s;}
.search-box:focus-within{border-color:var(--accent);}
.search-box svg{width:16px;height:16px;stroke:var(--muted);fill:none;stroke-width:2;flex-shrink:0;}
.search-input{flex:1;background:none;border:none;outline:none;color:var(--text);font-size:13px;}
.search-input::placeholder{color:var(--muted2);}
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.cats-wrap{padding:12px 0 8px;}
.cats-scroll{display:flex;gap:8px;overflow-x:auto;padding:0 18px;}
.cats-scroll::-webkit-scrollbar{display:none;}
.cat-btn{display:flex;align-items:center;gap:6px;padding:8px 14px;border-radius:99px;border:1px solid var(--border2);background:transparent;color:var(--muted);font-size:12px;font-weight:500;white-space:nowrap;cursor:pointer;transition:all 0.15s;flex-shrink:0;}
.cat-btn.active{background:var(--accent);border-color:var(--accent);color:#000;font-weight:600;}
.section{padding:0 18px 16px;}
.section-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.section-title{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:1px;color:var(--text);}
.section-more{font-size:11px;color:var(--accent);font-family:'DM Mono',monospace;cursor:pointer;background:none;border:none;letter-spacing:0.5px;}
.banner-wrap{padding:0 18px 16px;}
.banner{border-radius:16px;overflow:hidden;position:relative;height:200px;cursor:pointer;}
.banner-content{position:absolute;inset:0;padding:20px;display:flex;flex-direction:column;justify-content:flex-end;background:linear-gradient(to top,rgba(0,0,0,0.85) 0%,transparent 60%);}
.banner-cat{display:inline-flex;align-items:center;gap:5px;background:var(--accent);color:#000;font-size:10px;font-weight:700;padding:3px 10px;border-radius:99px;font-family:'DM Mono',monospace;letter-spacing:0.5px;margin-bottom:8px;width:fit-content;}
.banner-title{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:0.5px;line-height:1.1;color:#fff;margin-bottom:6px;}
.banner-meta{font-size:11px;color:rgba(255,255,255,0.5);font-family:'DM Mono',monospace;}
.card-lg{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:10px;cursor:pointer;transition:border-color 0.2s,transform 0.15s;animation:fadeUp 0.3s ease both;}
.card-lg:active{transform:scale(0.98);}
.card-img{height:140px;position:relative;overflow:hidden;}
.card-img-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,transparent 40%,rgba(0,0,0,0.6) 100%);}
.card-img-cat{position:absolute;top:10px;left:10px;font-size:9px;font-family:'DM Mono',monospace;font-weight:700;padding:3px 8px;border-radius:99px;letter-spacing:0.5px;text-transform:uppercase;}
.card-img-read{position:absolute;bottom:10px;right:10px;font-size:10px;color:rgba(255,255,255,0.6);font-family:'DM Mono',monospace;}
.card-body{padding:14px;}
.card-title{font-size:15px;font-weight:600;line-height:1.35;margin-bottom:6px;color:var(--text);}
.card-excerpt{font-size:12px;color:var(--muted);line-height:1.5;margin-bottom:10px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.card-footer{display:flex;align-items:center;justify-content:space-between;}
.card-author{display:flex;align-items:center;gap:6px;}
.card-avatar{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;}
.card-author-name{font-size:11px;color:var(--muted);}
.card-date{font-size:10px;color:var(--muted2);font-family:'DM Mono',monospace;}
.card-action-btn{background:none;border:none;color:var(--muted2);font-size:14px;cursor:pointer;padding:2px 4px;}
.card-sm{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid var(--border);cursor:pointer;animation:fadeUp 0.3s ease both;}
.card-sm:last-child{border-bottom:none;}
.card-sm:active{opacity:0.7;}
.card-sm-img{width:80px;height:80px;border-radius:var(--radius-sm);flex-shrink:0;overflow:hidden;position:relative;}
.card-sm-content{flex:1;min-width:0;}
.card-sm-cat{font-size:9px;font-family:'DM Mono',monospace;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;margin-bottom:4px;}
.card-sm-title{font-size:13px;font-weight:600;line-height:1.3;margin-bottom:4px;color:var(--text);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.card-sm-meta{font-size:10px;color:var(--muted2);font-family:'DM Mono',monospace;display:flex;gap:8px;}
.hscroll-wrap{margin:0 -18px;padding:0 18px 16px;}
.hscroll{display:flex;gap:10px;overflow-x:auto;padding-bottom:4px;}
.hscroll::-webkit-scrollbar{display:none;}
.card-mini{width:160px;flex-shrink:0;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;cursor:pointer;}
.card-mini:active{opacity:0.8;}
.card-mini-img{height:90px;position:relative;overflow:hidden;}
.card-mini-body{padding:10px;}
.card-mini-cat{font-size:8px;font-family:'DM Mono',monospace;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;margin-bottom:4px;}
.card-mini-title{font-size:12px;font-weight:600;line-height:1.3;color:var(--text);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.research-card{background:linear-gradient(135deg,rgba(96,165,250,0.08) 0%,rgba(167,139,250,0.06) 100%);border:1px solid rgba(96,165,250,0.2);border-radius:var(--radius);padding:16px;margin-bottom:10px;cursor:pointer;animation:fadeUp 0.3s ease both;}
.research-card:active{opacity:0.8;}
.research-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.research-badge{display:flex;align-items:center;gap:5px;background:rgba(96,165,250,0.15);border:1px solid rgba(96,165,250,0.3);color:var(--blue);font-size:10px;font-family:'DM Mono',monospace;padding:3px 10px;border-radius:99px;font-weight:700;letter-spacing:0.5px;}
.research-source{font-size:10px;color:var(--muted2);font-family:'DM Mono',monospace;}
.research-title{font-size:14px;font-weight:600;line-height:1.35;margin-bottom:8px;color:var(--text);}
.research-points{list-style:none;display:flex;flex-direction:column;gap:4px;margin-bottom:10px;}
.research-points li{display:flex;gap:8px;font-size:12px;color:var(--muted);line-height:1.4;}
/* FIX #1: poprawna encja Unicode dla strzałki w CSS (było: content:'rarr' lub content:'→') */
.research-points li::before{content:'\2192';color:var(--blue);flex-shrink:0;font-size:11px;margin-top:1px;}
.research-tip{background:rgba(200,241,53,0.08);border:1px solid rgba(200,241,53,0.2);border-radius:8px;padding:8px 12px;font-size:11px;color:var(--accent);line-height:1.4;}
.research-tip strong{font-weight:700;display:block;margin-bottom:3px;}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px;}
.stat-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 10px;text-align:center;}
.stat-val{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--accent);letter-spacing:0.5px;}
.stat-lbl{font-size:9px;color:var(--muted);font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:0.5px;margin-top:2px;}
.nav{display:flex;border-top:1px solid var(--border);flex-shrink:0;background:rgba(10,10,10,0.97);backdrop-filter:blur(12px);}
.nav-btn{flex:1;padding:11px 0 9px;background:none;border:none;color:var(--muted);font-size:9px;font-family:'DM Mono',monospace;cursor:pointer;transition:color 0.15s;display:flex;flex-direction:column;align-items:center;gap:3px;letter-spacing:0.5px;}
.nav-btn svg{width:20px;height:20px;stroke-width:1.5;stroke:currentColor;fill:none;}
.nav-btn.active{color:var(--accent);}
.fullview{position:fixed;inset:0;background:var(--bg);z-index:200;display:none;flex-direction:column;max-width:520px;margin:0 auto;}
.fullview.show{display:flex;}
.fv-hdr{display:flex;align-items:center;gap:12px;padding:14px 18px;border-bottom:1px solid var(--border);flex-shrink:0;}
.back-btn{background:var(--surface);border:1px solid var(--border2);color:var(--text);border-radius:8px;padding:7px 12px;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:5px;}
.fv-scroll{flex:1;overflow-y:auto;padding:20px 18px;}
.art-cat-tag{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-family:'DM Mono',monospace;font-weight:700;padding:3px 12px;border-radius:99px;letter-spacing:0.5px;margin-bottom:12px;}
.art-title{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:0.5px;line-height:1.15;margin-bottom:12px;}
.art-meta{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;padding-bottom:16px;border-bottom:1px solid var(--border);}
.art-author-row{display:flex;align-items:center;gap:8px;}
.art-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;}
.art-author-name{font-size:13px;font-weight:500;}
.art-date{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;}
.art-stats{display:flex;gap:10px;}
.art-stat{font-size:10px;color:var(--muted2);font-family:'DM Mono',monospace;}
.art-hero{height:200px;border-radius:var(--radius);overflow:hidden;position:relative;margin-bottom:16px;}
.art-body{font-size:14px;line-height:1.7;color:rgba(240,236,232,0.85);}
.art-body h3{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:0.5px;color:var(--text);margin:20px 0 8px;}
.art-body p{margin-bottom:14px;}
.art-body .highlight{background:rgba(200,241,53,0.08);border-left:3px solid var(--accent);padding:12px 14px;border-radius:0 8px 8px 0;margin:16px 0;font-size:13px;color:var(--accent);font-style:italic;}
.art-body .tip-box{background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:14px;margin:16px 0;}
.art-body .tip-box strong{display:block;font-size:11px;font-family:'DM Mono',monospace;color:var(--accent);letter-spacing:0.5px;margin-bottom:6px;}
.art-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:24px;padding-top:16px;border-top:1px solid var(--border);}
.art-tag{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:4px 10px;font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;}
.sources-section{margin-top:24px;padding-top:20px;border-top:2px solid rgba(96,165,250,0.25);}
.sources-hdr{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;color:var(--blue);margin-bottom:4px;}
.sources-sub{font-size:11px;color:var(--muted2);font-family:'DM Mono',monospace;margin-bottom:14px;}
.source-item{background:linear-gradient(135deg,rgba(96,165,250,0.06) 0%,rgba(167,139,250,0.04) 100%);border:1px solid rgba(96,165,250,0.15);border-radius:10px;padding:14px;margin-bottom:10px;}
.source-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.source-journal{font-size:10px;font-family:'DM Mono',monospace;color:var(--blue);font-weight:700;letter-spacing:0.5px;}
.source-year{font-size:10px;font-family:'DM Mono',monospace;color:var(--muted2);background:var(--surface2);padding:1px 6px;border-radius:4px;border:1px solid var(--border);}
.source-title-txt{font-size:12px;font-weight:600;color:var(--text);line-height:1.4;margin-bottom:4px;}
.source-authors{font-size:11px;color:var(--muted);font-style:italic;margin-bottom:8px;}
.source-finding{display:flex;gap:6px;align-items:flex-start;}
.source-arrow{color:var(--blue);font-size:12px;flex-shrink:0;margin-top:1px;}
.source-finding-text{font-size:12px;color:rgba(240,236,232,0.7);line-height:1.5;}
.source-finding-text strong{color:var(--accent);}
.source-pmid{display:inline-flex;align-items:center;gap:4px;margin-top:8px;font-size:10px;font-family:'DM Mono',monospace;color:var(--blue);opacity:0.6;}
.add-panel{position:fixed;inset:0;background:var(--bg);z-index:300;display:none;flex-direction:column;max-width:520px;margin:0 auto;}
.add-panel.show{display:flex;}
.add-hdr{display:flex;align-items:center;gap:12px;padding:14px 18px;border-bottom:1px solid var(--border);flex-shrink:0;}
.add-title-lbl{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;color:var(--accent);}
.add-scroll{flex:1;overflow-y:auto;padding:20px 18px;}
.add-info{background:rgba(200,241,53,0.06);border:1px solid rgba(200,241,53,0.2);border-radius:10px;padding:12px 14px;margin-bottom:20px;font-size:12px;color:var(--muted);line-height:1.6;}
.add-field{margin-bottom:18px;}
.add-lbl{font-size:11px;font-family:'DM Mono',monospace;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px;display:flex;align-items:center;gap:6px;}
.step-num{width:18px;height:18px;border-radius:50%;background:var(--accent);color:#000;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.add-textarea{width:100%;background:var(--surface);border:1px solid var(--border2);border-radius:10px;padding:14px;color:var(--text);font-size:13px;outline:none;resize:none;line-height:1.5;transition:border-color 0.15s;}
.add-textarea:focus,.add-input:focus{border-color:var(--accent);}
.add-textarea::placeholder,.add-input::placeholder{color:var(--muted2);}
.add-input{width:100%;background:var(--surface);border:1px solid var(--border2);border-radius:10px;padding:12px 14px;color:var(--text);font-size:13px;outline:none;transition:border-color 0.15s;}
.add-select{width:100%;background:var(--surface);border:1px solid var(--border2);border-radius:10px;padding:12px 14px;color:var(--text);font-size:13px;outline:none;appearance:none;cursor:pointer;}
.add-select option{background:var(--surface2);}
.btn-gen{width:100%;padding:15px;background:linear-gradient(135deg,var(--accent) 0%,var(--accent2) 100%);color:#000;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:opacity 0.15s;}
.btn-gen:active,.btn-gen:disabled{opacity:0.6;cursor:not-allowed;}
.btn-secondary{width:100%;padding:13px;background:var(--surface2);border:1px solid var(--border2);color:var(--text);border-radius:12px;font-size:14px;font-weight:500;cursor:pointer;margin-top:10px;}
.gen-box{background:var(--surface);border:1px solid rgba(200,241,53,0.2);border-radius:12px;padding:24px;text-align:center;margin-top:16px;}
.gen-icon{font-size:32px;margin-bottom:12px;display:inline-block;animation:spin 2s linear infinite;}
.preview-box{background:var(--surface);border:1px solid rgba(200,241,53,0.3);border-radius:12px;padding:16px;margin-top:16px;animation:fadeUp 0.3s ease both;}
.preview-title{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:0.5px;color:var(--accent);margin-bottom:6px;}
.preview-excerpt{font-size:12px;color:var(--muted);line-height:1.5;margin-bottom:12px;}
.preview-sources{border-top:1px solid var(--border);padding-top:12px;}
.preview-sources-lbl{font-size:10px;font-family:'DM Mono',monospace;color:var(--blue);letter-spacing:0.5px;margin-bottom:8px;}
.preview-source{background:rgba(96,165,250,0.06);border:1px solid rgba(96,165,250,0.15);border-radius:8px;padding:10px;margin-bottom:6px;font-size:11px;color:var(--muted);line-height:1.5;}
.preview-source-j{color:var(--blue);font-weight:700;font-family:'DM Mono',monospace;font-size:10px;display:block;margin-bottom:2px;}
.g1{background:linear-gradient(135deg,#1a2a0a,#2d4a1a);}
.g2{background:linear-gradient(135deg,#0a1a2a,#1a3040);}
.g3{background:linear-gradient(135deg,#2a1a0a,#4a2a1a);}
.g4{background:linear-gradient(135deg,#1a0a2a,#2a1a40);}
.g5{background:linear-gradient(135deg,#0a2a2a,#1a4040);}
.g6{background:linear-gradient(135deg,#2a0a1a,#401a2a);}
.g7{background:linear-gradient(135deg,#1a1a0a,#3a3a1a);}
.empty{text-align:center;padding:40px 20px;color:var(--muted);}
.empty-icon{font-size:36px;margin-bottom:10px;opacity:0.4;}
.dot-loader{display:flex;gap:4px;align-items:center;justify-content:center;margin-top:14px;}
.dot-loader span{width:6px;height:6px;border-radius:50%;background:var(--blue);animation:dotPulse 1.2s ease infinite;}
.dot-loader span:nth-child(2){animation-delay:0.2s;}
.dot-loader span:nth-child(3){animation-delay:0.4s;}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.6;}}
@keyframes spin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
@keyframes dotPulse{0%,80%,100%{opacity:0.2;transform:scale(0.8);}40%{opacity:1;transform:scale(1);}}
</style>
</head>
<body>
<div class="app">
  <div class="hdr">
    <div class="hdr-logo">NEWS<span>GYM</span></div>
    <div class="hdr-right">
      <div class="live-badge"><div class="live-dot"></div>NA ZYWO</div>
      <button class="sync-btn" onclick="syncNow()">SYNC</button>
    </div>
  </div>
  <div class="fb-bar" id="fb-bar">
    <div class="fb-dot loading" id="fb-dot"></div>
    <span id="fb-txt">Lacze z Firebase...</span>
  </div>
  <div class="search-wrap">
    <div class="search-box">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input class="search-input" type="text" id="search-input" placeholder="Szukaj: trening, dieta, kreatyna..." oninput="doSearch(this.value)">
    </div>
  </div>
  <div class="scroll" id="main-scroll">
    <div class="cats-wrap"><div class="cats-scroll" id="cats-scroll"></div></div>
    <div id="main-content"></div>
  </div>
  <div class="nav">
    <button class="nav-btn active" onclick="goTab('home')">

const firebaseConfig = {

};
setTimeout(() => { if(window._loadFromFirebase) window._loadFromFirebase(); }, 600);

function renderProtocolHTML(p,title){
  if(!p) return '';
  var rows=[{icon:'💊',label:'DAWKA',val:p.dawka},{icon:'⏰',label:'KIEDY',val:p.kiedy},{icon:'🔄',label:'CZĘSTOTLIWOŚĆ',val:p.czestotliwosc},{icon:'⚡',label:'EFEKTY PO',val:p.efekty},{icon:'⚠️',label:'UWAGA',val:p.uwaga}].filter(function(r){return r.val;});
  var isOdd=rows.length%2!==0;
  var tips=(p.wskazowki||[]).map(function(w){return '<div style="display:flex;gap:10px;align-items:flex-start;padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.05);"><span style="color:#c8f135;flex-shrink:0;margin-top:2px;">✓</span><span style="font-size:13px;color:rgba(240,236,232,0.85);line-height:1.5;">'+w+'</span></div>';}).join('');
  var gridItems=rows.map(function(r,i){var span=(isOdd&&i===rows.length-1)?'grid-column:1/-1;':'';return '<div style="background:#0a0a0a;padding:14px 16px;'+span+'"><div style="font-size:9px;font-family:DM Mono,monospace;color:#555;letter-spacing:0.5px;margin-bottom:4px;">'+r.icon+' '+r.label+'</div><div style="font-size:14px;font-weight:600;color:#f0ece8;line-height:1.3;">'+r.val+'</div></div>';}).join('');
  return '<div style="background:rgba(200,241,53,0.04);border:1px solid rgba(200,241,53,0.2);border-radius:12px;overflow:hidden;">'+(title?'<div style="background:rgba(200,241,53,0.08);padding:12px 16px;border-bottom:1px solid rgba(200,241,53,0.15);"><div style="font-size:9px;font-family:DM Mono,monospace;color:#c8f135;letter-spacing:0.5px;margin-bottom:3px;">PROTOKÓŁ DOTYCZY</div><div style="font-size:14px;font-weight:600;color:#f0ece8;line-height:1.3;">'+title+'</div></div>':'')+'<div style="display:grid;grid-template-columns:1fr 1fr;gap:1px;background:rgba(200,241,53,0.1);">'+gridItems+'</div>'+(tips?'<div style="padding:14px 16px;"><div style="font-size:10px;font-family:DM Mono,monospace;color:#c8f135;letter-spacing:0.5px;margin-bottom:4px;">💡 WSKAZÓWKI PRAKTYCZNE</div>'+tips+'</div>':'')+'</div>';
}

async function generateProtocol(id){
  var a=window.ARTICLES.find(function(x){return x.id===id||x.id==id;});
  if(!a) return;
  var btn=document.getElementById('protocol-btn');
  var content=document.getElementById('protocol-content');
  if(btn){btn.textContent='⏳ Generuję...';btn.disabled=true;}
  if(content) content.innerHTML='<div style="text-align:center;padding:20px;color:#60a5fa;font-size:12px;font-family:DM Mono,monospace;"><div style="animation:spin 1s linear infinite;display:inline-block;font-size:24px;">⚡</div><div style="margin-top:8px;">AI tworzy protokół...</div></div>';
  var prompt='Stwórz protokół zastosowania dla artykułu fitness. Odpowiedz TYLKO czystym JSON bez markdown:\n{"dawka":"...","kiedy":"...","czestotliwosc":"...","efekty":"...","uwaga":"...","wskazowki":["...","...","..."]}\n\nArtykul: '+a.title+'\n'+a.excerpt;
  try{
    var resp=await fetch(WORKER_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:400,messages:[{role:'user',content:prompt}]})});
    var data=await resp.json();
    var raw=data.content.map(function(i){return i.text||'';}).join('');
    var s=raw.indexOf('{'),e=raw.lastIndexOf('}');
    var protocol=JSON.parse(raw.substring(s,e+1));
    a.protocol=protocol;
    if(content) content.innerHTML=renderProtocolHTML(protocol,a.title);
    if(btn){btn.textContent='✅ Gotowe';btn.style.color='#60a5fa';}

}

async function loadPubMed(){
  var box=document.getElementById('sources-feed');
  if(!box) return;
  box.innerHTML+='<div id="pubmed-loading" style="color:#60a5fa;font-size:12px;padding:8px 0;font-family:DM Mono,monospace;">🔬 Pobieranie z PubMed...</div>';
  var topic=PUBMED_TOPICS[Math.floor(Math.random()*PUBMED_TOPICS.length)];
  try{
    var r=await fetch('https://eutils.ncbi.nlm.nih.gov/entrez/eutils/esearch.fcgi?db=pubmed&term='+encodeURIComponent(topic)+'&retmax=8&sort=date&retmode=json');
    var d=await r.json();
    var ids=d.esearchresult.idlist;
    if(!ids.length){document.getElementById('pubmed-loading').textContent='Brak wyników PubMed';return;}
    var r2=await fetch('https://eutils.ncbi.nlm.nih.gov/entrez/eutils/esummary.fcgi?db=pubmed&id='+ids.join(',')+'&retmode=json');
    var d2=await r2.json();
    var html='<div style="font-family:Bebas Neue,sans-serif;font-size:16px;letter-spacing:1px;color:#60a5fa;margin:12px 0 8px;">PUBMED — '+topic.toUpperCase()+'</div>';
    ids.forEach(function(id){
      var a=d2.result[id];
      if(!a) return;
      var title=a.title||'Brak tytułu';
      var journal=a.fulljournalname||a.source||'';
      var year=a.pubdate?a.pubdate.substring(0,4):'';
      var authors=a.authors&&a.authors.length?a.authors.slice(0,2).map(function(x){return x.name;}).join(', '):'';
      /* FIX #4: sanitacja apostrofów i cudzysłowów w tytułach z PubMed */
      var safeTitle=title.replace(/'/g,'&#39;').replace(/"/g,'&quot;');
      var safeJournal=journal.replace(/'/g,'&#39;').replace(/"/g,'&quot;');
      html+='<div style="background:linear-gradient(135deg,rgba(96,165,250,0.06),rgba(167,139,250,0.04));border:1px solid rgba(96,165,250,0.2);border-radius:10px;padding:14px;margin-bottom:8px;"><div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;"><span style="font-size:9px;font-family:DM Mono,monospace;color:#60a5fa;font-weight:700;">🔬 PUBMED · '+year+'</span><span style="font-size:9px;font-family:DM Mono,monospace;color:#555;">'+safeJournal.substring(0,25)+'</span></div><div style="font-size:13px;font-weight:600;color:#f0ece8;line-height:1.4;margin-bottom:6px;">'+safeTitle.substring(0,120)+(title.length>120?'...':'')+'</div><div style="font-size:11px;color:#777;margin-bottom:10px;font-style:italic;">'+authors+'</div><button onclick="generateFromSource(\''+safeTitle.substring(0,80).replace(/'/g,'&#39;')+'\',\''+safeJournal.substring(0,30).replace(/'/g,'&#39;')+'\',\''+year+'\',\'badania\')" style="background:linear-gradient(135deg,#c8f135,#a8d420);color:#000;border:none;border-radius:8px;padding:7px 14px;font-size:11px;font-weight:700;cursor:pointer;width:100%;">⚡ GENERUJ ARTYKUŁ PO POLSKU</button></div>';
    });
    var loading=document.getElementById('pubmed-loading');
    if(loading) loading.remove();
    box.innerHTML+=html;
  }catch(e){
    var loading=document.getElementById('pubmed-loading');
    if(loading) loading.textContent='❌ Błąd PubMed: '+e.message;
  }
}

async function loadRSS(){
  var box=document.getElementById('sources-feed');
  if(!box) return;
  box.innerHTML+='<div id="rss-loading" style="color:#c8f135;font-size:12px;padding:8px 0;font-family:DM Mono,monospace;">📰 Pobieranie blogów fitness...</div>';
  var html='<div style="font-family:Bebas Neue,sans-serif;font-size:16px;letter-spacing:1px;color:#c8f135;margin:12px 0 8px;">BLOGI FITNESS</div>';
  var loaded=0;
  for(var i=0;i<RSS_FEEDS.length;i++){
    var feed=RSS_FEEDS[i];
    try{
      var r=await fetch(feed.url);
      var d=await r.json();
      if(d.status!=='ok'||!d.items||!d.items.length) continue;
      d.items.slice(0,3).forEach(function(item){
        var title=item.title||'';
        var desc=item.description?item.description.replace(/<[^>]*>/g,'').substring(0,150):'';
        var date=item.pubDate?item.pubDate.substring(0,10):'';
        var cat=guessCat(title+' '+desc);
        /* FIX #4: sanitacja apostrofów i cudzysłowów w tytułach RSS */
        var safeTitle=title.replace(/'/g,'&#39;').replace(/"/g,'&quot;');
        var safeFeedName=feed.name.replace(/'/g,'&#39;');
        var btnId='rss-'+loaded;
        html+='<div style="background:rgba(200,241,53,0.04);border:1px solid rgba(200,241,53,0.15);border-radius:10px;padding:14px;margin-bottom:8px;"><div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;"><span style="font-size:9px;font-family:DM Mono,monospace;color:#c8f135;font-weight:700;">📰 '+safeFeedName+'</span><span style="font-size:9px;font-family:DM Mono,monospace;color:#555;">'+date+'</span></div><div style="font-size:13px;font-weight:600;color:#f0ece8;line-height:1.4;margin-bottom:6px;">'+safeTitle.substring(0,100)+(title.length>100?'...':'')+'</div><div style="font-size:11px;color:#777;margin-bottom:10px;">'+desc+(desc.length>=150?'...':'')+'</div><button id="'+btnId+'" style="background:linear-gradient(135deg,#c8f135,#a8d420);color:#000;border:none;border-radius:8px;padding:7px 14px;font-size:11px;font-weight:700;cursor:pointer;width:100%;">⚡ GENERUJ ARTYKUŁ PO POLSKU</button></div>';
        (function(t,s,c){setTimeout(function(){var btn=document.getElementById(btnId);if(btn)btn.onclick=function(){generateFromSource(t,s,'',c);};},100);})(safeTitle.substring(0,80),safeFeedName,cat);
        loaded++;
      });
    }catch(e){}
  }
  var loading=document.getElementById('rss-loading');
  if(loading) loading.remove();
  if(loaded===0) html+='<div style="color:#ff4444;font-size:12px;">Nie udało się pobrać blogów (CORS). Użyj PubMed.</div>';
  box.innerHTML+=html;
}

function guessCat(text){
  var t=text.toLowerCase();
  if(t.includes('strength')||t.includes('powerlifting')||t.includes('squat')) return 'sila';
  if(t.includes('cardio')||t.includes('running')||t.includes('hiit')) return 'cardio';
  if(t.includes('diet')||t.includes('nutrition')||t.includes('protein')) return 'dieta';
  if(t.includes('supplement')||t.includes('creatine')||t.includes('caffeine')) return 'supl';
  if(t.includes('sleep')||t.includes('recovery')) return 'lifestyle';
  if(t.includes('recipe')||t.includes('meal')) return 'przepisy';
  if(t.includes('motivation')||t.includes('mental')) return 'motyw';
  if(t.includes('research')||t.includes('study')||t.includes('meta')) return 'badania';
  return 'trening';
}

  document.getElementById('add-panel').classList.add('show');
  document.getElementById('gen-status').innerHTML='';
  document.getElementById('add-text').value=text;
  var sel=document.getElementById('add-cat');

}

/* FIX #2: switchPubTab — obsługa zakładek FB/IG/WA (wcześniej brakująca funkcja) */
function switchPubTab(tab){
  ['fb','ig','wa'].forEach(function(t){
    var p=document.getElementById('ppanel-'+t);
    var b=document.getElementById('ptab-'+t);
    if(!p||!b) return;
    var on=t===tab;
    p.style.display=on?'block':'none';
    var colors={fb:'#1877f2',ig:'#f97316',wa:'#25d366'};
    var textColors={fb:'#60a5fa',ig:'#f97316',wa:'#25d366'};
    if(on){
      b.style.background='rgba('+hexToRgbStr(colors[t])+',0.12)';
      b.style.borderBottom='2px solid '+colors[t];
      b.style.color=textColors[t];
    } else {
      b.style.background='transparent';
      b.style.borderBottom='2px solid transparent';
      b.style.color='#555';
    }
  });
}

function hexToRgbStr(hex){
  var r=parseInt(hex.slice(1,3),16);
  var g=parseInt(hex.slice(3,5),16);
  var b=parseInt(hex.slice(5,7),16);
  return r+','+g+','+b;
}

function buildFbText(a){
  var mm=m(a.cat);
  var parts=[];
  // Dodaj excerpt jako pierwsze zdanie
  if(a.excerpt) parts.push(a.excerpt);
  // Pobierz treść artykułu bez HTML
  if(a.content){
    var tmp=document.createElement('div');
    tmp.innerHTML=a.content;
    tmp.querySelectorAll('h3,p,.highlight,.tip-box').forEach(function(el){
      var t=el.textContent.trim();
      if(t&&t.length>10&&parts.indexOf(t)===-1){
        parts.push(el.tagName==='H3'?'📌 '+t:t);
      }
    });
  }
  // Jeśli artykuł z Firebase ma points
  if(a.points&&a.points.length){
    a.points.forEach(function(p,i){parts.push('✅ '+p);});
  }
  if(a.practicalTip) parts.push('💡 '+a.practicalTip);
  var bodyClean=parts.join('\n\n');
  if(!bodyClean) bodyClean=a.excerpt||'';
  var tags=(a.tags||[a.cat,'fitness']).map(function(t){return '#'+t.replace(/\s+/g,'');}).join(' ')+' #fitness #trening #newsgym #silownia #nauka';
  return mm.icon+' '+a.title.toUpperCase()+'\n\n'+bodyClean+'\n\n'+tags;
}
function buildIgText(a){
  var mm=m(a.cat);
  var parts=[];
  if(a.excerpt) parts.push(a.excerpt);
  if(a.content){
    var tmp=document.createElement('div');
    tmp.innerHTML=a.content;
    tmp.querySelectorAll('h3,p,.highlight,.tip-box').forEach(function(el){
      var t=el.textContent.trim();
      if(t&&t.length>10&&parts.indexOf(t)===-1){
        parts.push(el.tagName==='H3'?'\n📌 '+t:t);
      }
    });
  }
  if(a.points&&a.points.length) a.points.forEach(function(p){parts.push('✅ '+p);});
  if(a.practicalTip) parts.push('\n💡 '+a.practicalTip);
  var body=parts.join('\n\n');

// Przechowuje aktualnie wybrany URL zdjęcia dla FB i IG
var selectedPhoto = {fb: null, ig: null};
var currentArticleForModal = null;

function initPhotoGallery(article, platform) {
  var cat = article.cat || 'trening';
  var photos = UNSPLASH_PHOTOS[cat] || UNSPLASH_PHOTOS.trening;
  var galleryId = 'photo-gallery-' + platform;
  var gallery = document.getElementById(galleryId);
  if(!gallery) return;

  // Pierwsze zdjęcie = aktualne z artykułu
  var allPhotos = [article.imageUrl || getImg(cat)].concat(photos).filter(function(p,i,arr){return arr.indexOf(p)===i;}).slice(0,5);

  // Domyślnie wybierz pierwsze
  if(!selectedPhoto[platform]) selectedPhoto[platform] = allPhotos[0];

  gallery.innerHTML = allPhotos.map(function(url, i) {
    var isSelected = (url === selectedPhoto[platform]);
    var encodedUrl = encodeURIComponent(url);
    return '<div data-url="' + encodedUrl + '" data-plat="' + platform + '" class="photo-thumb" style="flex-shrink:0;width:70px;height:50px;border-radius:6px;overflow:hidden;cursor:pointer;border:' + (isSelected?'2px solid #c8f135':'1px solid rgba(255,255,255,0.15)') + ';position:relative;">'
      + '<img src="' + url + '" style="width:100%;height:100%;object-fit:cover;" loading="lazy">'
      + (isSelected ? '<div style="position:absolute;inset:0;background:rgba(200,241,53,0.25);display:flex;align-items:center;justify-content:center;">✓</div>' : '')
      + '</div>';
  }).join('');

  // Dodaj click handler przez delegację (bez onclick w HTML)
  gallery.onclick = function(e) {
    var thumb = e.target.closest('.photo-thumb');
    if(!thumb) return;
    var url = decodeURIComponent(thumb.getAttribute('data-url'));
    var plat = thumb.getAttribute('data-platform');
    selectPhoto(thumb, url, plat);
  };
}

function selectPhoto(el, url, platform) {
  selectedPhoto[platform] = url;
  // Odśwież galerię
  if(currentArticleForModal) initPhotoGallery(currentArticleForModal, platform);
  // Przerysuj canvas
  var canvas = document.getElementById('pub-' + platform + '-canvas');
  if(!canvas || !currentArticleForModal) return;
  drawGfxWithPhoto(canvas, currentArticleForModal, url, platform);
}

function loadCustomPhoto(input, platform) {
  var file = input.files[0];
  if(!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    selectedPhoto[platform] = e.target.result;
    // Dodaj do galerii jako pierwszą opcję
    var gallery = document.getElementById('photo-gallery-' + platform);
    if(gallery) {
      var div = document.createElement('div');
      div.style.cssText = 'flex-shrink:0;width:70px;height:50px;border-radius:6px;overflow:hidden;cursor:pointer;border:2px solid #c8f135;';
      div.innerHTML = '<img src="' + e.target.result + '" style="width:100%;height:100%;object-fit:cover;">';
      div.onclick = function(){ selectPhoto(div, e.target.result, platform); };
      gallery.insertBefore(div, gallery.firstChild);
    }
    // Przerysuj canvas
    var canvas = document.getElementById('pub-' + platform + '-canvas');
    if(canvas && currentArticleForModal) drawGfxWithPhoto(canvas, currentArticleForModal, e.target.result, platform);

  reader.readAsDataURL(file);
}

function roundCv(ctx,x,y,w,h,r){
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();ctx.fill();
}
function wrapCv(ctx,text,x,y,maxW,lineH){
  if(!text) return 0;
  var words=text.split(' '),line='',lines=[];
  for(var i=0;i<words.length;i++){var test=line+words[i]+' ';if(ctx.measureText(test).width>maxW&&line!==''){lines.push(line.trim());line=words[i]+' ';}else line=test;}
  if(line.trim()) lines.push(line.trim());
  lines.forEach(function(l,i){ctx.fillText(l,x,y+i*lineH);});
  return lines.length*lineH;
}

renderCats();
render();
</script>
